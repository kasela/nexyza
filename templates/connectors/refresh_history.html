{% extends 'app_base.html' %}
{% block content %}<div class="max-w-6xl mx-auto p-6 space-y-6"><div class="glass rounded-3xl p-6"><h1 class="text-2xl font-semibold">Refresh History</h1><p class="text-sm text-slate-400 mt-2">Recent connector sync runs and outcomes.</p></div><div class="glass rounded-3xl p-6 overflow-x-auto"><table class="min-w-full text-sm"><thead><tr class="text-slate-400"><th class="text-left p-2">Connector</th><th class="text-left p-2">Status</th><th class="text-left p-2">Rows</th><th class="text-left p-2">Started</th></tr></thead><tbody>{% for log in logs %}<tr class="border-t border-white/10"><td class="p-2">{{ log.connector.name }}</td><td class="p-2">{{ log.status }}</td><td class="p-2">{{ log.row_count }}</td><td class="p-2">{{ log.started_at }}</td></tr>{% empty %}<tr><td class="p-2" colspan="4">No refresh runs yet.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
