<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#060611;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#060611;padding:40px 20px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

        <!-- Logo -->
        <tr><td align="center" style="padding-bottom:32px;">
          <div style="display:inline-flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#3b82f6);display:inline-block;"></div>
            <span style="color:#ffffff;font-size:20px;font-weight:700;">Nexyza</span>
          </div>
        </td></tr>

        <!-- Card -->
        <tr><td style="background:rgba(30,27,46,0.9);border:1px solid rgba(124,58,237,0.2);border-radius:16px;padding:40px 36px;">
          <p style="color:#a78bfa;font-size:12px;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 16px;">Password Reset</p>
          <h1 style="color:#ffffff;font-size:24px;font-weight:700;margin:0 0 16px;line-height:1.3;">Reset your password</h1>
          <p style="color:#94a3b8;font-size:15px;line-height:1.6;margin:0 0 28px;">
            You requested a password reset for your Nexyza account. Click the button below to choose a new password.
          </p>

          <!-- CTA Button -->
          <div style="text-align:center;margin-bottom:28px;">
            <a href="{{ password_reset_url }}"
               style="display:inline-block;background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:13px 32px;border-radius:10px;box-shadow:0 4px 20px rgba(124,58,237,0.4);">
              Reset Password →
            </a>
          </div>

          <p style="color:#64748b;font-size:13px;line-height:1.6;margin:0 0 8px;">
            This link expires in <strong style="color:#94a3b8;">24 hours</strong>.
          </p>
          <p style="color:#64748b;font-size:13px;line-height:1.6;margin:0;">
            If you didn't request this, you can safely ignore this email.
          </p>
        </td></tr>

        <!-- Footer -->
        <tr><td style="padding-top:24px;text-align:center;">
          <p style="color:#374151;font-size:12px;margin:0;">
            © 2025 Nexyza · <a href="mailto:hello@nexyza.com" style="color:#475569;text-decoration:none;">hello@nexyza.com</a>
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
