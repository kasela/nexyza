{% extends 'public_base.html' %}
{% block title %}Password Reset — Nexyza{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="text-center max-w-sm">
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:2.5rem">
      <div class="text-5xl mb-4">✅</div>
      <h1 class="text-2xl font-bold text-white mb-3" style="font-family:'Sora',sans-serif">Password updated!</h1>
      <p class="text-slate-400 mb-6">Your password has been successfully changed.</p>
      <a href="{% url 'account_login' %}" class="btn-cta py-3 px-8 inline-flex">Sign in now</a>
    </div>
  </div>
</div>
{% endblock %}
