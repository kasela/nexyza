{% extends 'public_base.html' %}
{% block title %}Check Your Email — Nexyza{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md text-center">
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:2.5rem">
      <div class="text-5xl mb-4">📬</div>
      <h1 class="text-2xl font-bold text-white mb-3" style="font-family:'Sora',sans-serif">Check your email</h1>
      <p class="text-slate-400 mb-6">We've sent password reset instructions to your email address. The link expires in 24 hours.</p>
      <a href="{% url 'account_login' %}" class="btn-outline">Back to login</a>
    </div>
  </div>
</div>
{% endblock %}
