{% extends 'public_base.html' %}
{% block title %}Reset Password — Nexyza{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:linear-gradient(135deg,#7c3aed,#3b82f6)">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white" style="font-family:'Sora',sans-serif">Reset your password</h1>
      <p class="text-slate-400 text-sm mt-2">Enter your email and we'll send you a reset link.</p>
    </div>
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:2rem">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label style="display:block;color:#94a3b8;font-size:.875rem;font-weight:500;margin-bottom:.375rem">Email address</label>
          <input type="email" name="email" required autocomplete="email"
                 style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:.75rem;padding:.75rem 1rem;color:#e2e0f0;font-size:.875rem;outline:none;"
                 placeholder="you@example.com"
                 onfocus="this.style.borderColor='rgba(124,58,237,.6)'" onblur="this.style.borderColor='rgba(255,255,255,.1)'">
        </div>
        <button type="submit" class="btn-cta w-full justify-center py-3">Send Reset Link</button>
      </form>
      <p style="text-align:center;color:#64748b;font-size:.875rem;margin-top:1.25rem">
        <a href="{% url 'account_login' %}" style="color:#a78bfa">Back to login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
