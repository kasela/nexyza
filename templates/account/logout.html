{% extends 'public_base.html' %}
{% block title %}Logout — Nexyza{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="glass rounded-2xl p-10 text-center max-w-sm w-full">
    <p class="text-white font-semibold text-lg mb-2">Sign out of Nexyza?</p>
    <p class="text-slate-400 text-sm mb-6">You'll need to sign in again to access your files.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-primary w-full justify-center py-3">Sign Out</button>
    </form>
    <a href="/" class="block mt-3 text-slate-500 text-sm hover:text-slate-300 transition-colors">Cancel</a>
  </div>
</div>
{% endblock %}
